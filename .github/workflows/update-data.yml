name: Auto update dashboard data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and update data
        env:
          AUTO_APPEND_OFFICIAL: "false"
          AUTO_APPEND_MEDIA: "false"
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          git config user.name "bdbv-dashboard-bot"
          git config user.email "bdbv-dashboard-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No data changes to commit" || git commit -m "Auto update BDBV dashboard data"
          git push
